<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="author" content="Karan">
    <meta name="description" content="Karan — an interactive Virgo constellation. Click a star to read its post and hear the mix.">
    <title>KARAN.INK</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20fill='%23000'/%3E%3Cpath%20d='M16%205l2.2%208.8L27%2016l-8.8%202.2L16%2027l-2.2-8.8L5%2016l8.8-2.2z'%20fill='%23fff'/%3E%3C/svg%3E">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>

    <!-- jsDelivr CDN: better CORS headers -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
                "three/examples/jsm/postprocessing/EffectComposer.js": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/postprocessing/EffectComposer.js",
                "three/examples/jsm/postprocessing/RenderPass.js": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/postprocessing/RenderPass.js",
                "three/examples/jsm/postprocessing/UnrealBloomPass.js": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/postprocessing/UnrealBloomPass.js",
                "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>
</head>
<body>
    <noscript>You need to enable JavaScript to run this application.</noscript>

    <header class="site-header">
        <span class="wordmark" tabindex="0" role="button" aria-label="Reset view">KARAN.INK</span>
    </header>

    <main class="page">
        <div class="star-box" id="star-box">
            <canvas id="virgo-constellation" aria-label="Interactive Virgo constellation visualization"></canvas>
        </div>
        <article class="post" id="post" aria-live="polite"></article>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
